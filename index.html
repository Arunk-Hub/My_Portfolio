<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arun K - ASP.NET Developer</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body data-theme="light">
    <header>
        <div class="navbar container">
            <a href="#" class="logo">ARUN<span style="color:var(--accent)">.K</span></a>
            <nav class="nav-links">
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <button id="theme-switch" class="theme-toggle">
                    <i class="fas fa-moon"></i> Dark Mode
                </button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="home" class="hero-card">
            <span class="hero-badge">ASP.NET CORE & BLAZOR</span>
            <h1 class="hero-title">Software Developer</h1>
            <p class="hero-desc" style="color: var(--text-muted); font-size: 1.2rem;">
                Crafting robust enterprise solutions with .NET and modern web technologies.
            </p>
            </section>
        
        </main>

    <script>
        const themeBtn = document.getElementById('theme-switch');
        const body = document.body;

        themeBtn.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                themeBtn.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
            } else {
                body.setAttribute('data-theme', 'light');
                themeBtn.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
            }
        });

        // Intersection Observer logic from original file preserved
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.style.opacity = 1;
            });
        });
        document.querySelectorAll('section').forEach(el => observer.observe(el));
    </script>
</body>
</html>
